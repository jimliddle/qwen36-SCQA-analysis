          </div>

          {showRadar ? (
            <div className="bg-slate-900/40 backdrop-blur-sm rounded-xl p-5 border border-slate-800 fade-in">
              <div className="text-xs font-semibold text-slate-500 uppercase tracking-widest mb-1 text-center">Normalised Relative Capability (0-10)</div>
              <div className="text-[10px] text-slate-600 mb-4 text-center">Data availability heavily influences shape. Not a strict superiority map.</div>
              <div className="h-[400px] w-full max-w-2xl mx-auto">
                <ResponsiveContainer width="100%" height="100%">
                  <RadarChart data={radarData} margin={{ top: 20, right: 30, bottom: 20, left: 30 }}>
                    <PolarGrid stroke="#1e293b" />
                    <PolarAngleAxis dataKey="dimension" tick={{ fontSize: 11, fill: '#94a3b8' }} />
                    <PolarRadiusAxis domain={[0, 10]} tick={{ fontSize: 10, fill: '#475569' }} tickCount={5} angle={30} />
                    {Object.keys(VS_SCORES).map(m => (
                      <Radar key={m} name={m} dataKey={m} stroke={VS_COLORS[m]} fill={VS_COLORS[m]} fillOpacity={0.15} strokeWidth={2.5} />
                    ))}
                    <Legend wrapperStyle={{ fontSize: 12, color: '#e2e8f0', paddingTop: '10px' }} />
                    <Tooltip 
                      contentStyle={{ backgroundColor: '#0f172a', border: '1px solid #334155', borderRadius: '8px' }} 
                      labelStyle={{ color: '#f8fafc', fontWeight: 'bold' }} 
                      itemStyle={{ fontSize: '12px' }}
                    />
                  </RadarChart>
                </ResponsiveContainer>
              </div>
            </div>
          ) : (
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 fade-in">
              {headToHead.map((h, i) => (
                <div key={i} className="bg-slate-900/40 backdrop-blur-sm rounded-xl p-4 border border-slate-800 hover:bg-slate-900/60 transition-colors">
                  <div className="flex items-center justify-between gap-3 mb-3 pb-2 border-b border-slate-800/50">
                    <span className="text-sm font-bold text-white truncate pr-2">{h.dimension}</span>
                    <span className="text-[10px] px-2.5 py-1 rounded-md text-white font-bold uppercase tracking-wider shrink-0"
                      style={{ backgroundColor: winnerColor(h.winner) }}>
                      {winnerLabel(h.winner)}
                    </span>
                  </div>
                  <div className="grid grid-cols-3 gap-3 mb-3">
                    {[
                      { label: 'Qwen 27B', val: h.qwen, color: '#ef4444' },
                      { label: 'Gemma 31B', val: h.gemma31, color: '#a855f7' },
                      { label: 'Gemma 26B MoE', val: h.gemma_moe, color: '#3b82f6' },
                    ].map(c => (
                      <div key={c.label} className="bg-[#020617] rounded-lg p-2 text-center border border-slate-800/30">
                        <div className="text-[10px] font-bold mb-1 uppercase tracking-wider truncate" style={{ color: c.color }}>{c.label}</div>
                        <div className="text-sm font-mono text-slate-200">{c.val}</div>
                      </div>
                    ))}
                  </div>
                  <p className="text-[11px] text-slate-400 italic leading-relaxed">{h.note}</p>
                </div>
              ))}
            </div>
          )}

          <div className="grid md:grid-cols-2 gap-4 mt-6">
            {[
              {
                title: 'Route to Qwen3.6-27B when:',
                color: '#ef4444', borderInfo: 'border-red-900/30 bg-red-950/10',
                items: [
                  'Task is coding (repository-level, agentic, frontend, or terminal-based)',
                  'Workflow is multi-turn iterative (Thinking Preservation saves tokens)',
                  'Input includes video (VideoMME 87.7%)',
                  'Context depth matters (262K native window for full codebase review)',
                ],
              },
              {
                title: 'Route to Gemma 4 when:',
                color: '#a855f7', borderInfo: 'border-violet-900/30 bg-violet-950/10',
                items: [
                  'Task is generalised agentic tool use (τ2-bench 86.4% record)',
                  'Deployment target is edge/mobile (E2B/E4B run on Raspberry Pi)',
                  'CUDA 13.2 is unavoidable on target hardware',
                  'Architectural simplicity matters for serving stack',
                ],
              },
            ].map(s => (
              <div key={s.title} className={`rounded-xl p-5 border ${s.borderInfo} backdrop-blur-sm`}>
                <div className="text-sm font-bold mb-4 uppercase tracking-wider" style={{ color: s.color }}>{s.title}</div>
                <div className="space-y-3">
                  {s.items.map((item, i) => (
                    <div key={i} className="flex gap-2 text-sm text-slate-300">
                      <span className="shrink-0 mt-0.5 font-bold" style={{ color: s.color }}>▸</span>
                      <span className="leading-relaxed">{item}</span>
                    </div>
                  ))}
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // Initialize React App
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
